<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bitwig Oikontrol User Guide</title>
  <style>
    :root {
      --paper: #f4efe7;
      --ink: #162028;
      --muted: #55636f;
      --panel: #fffdf9;
      --line: #d7c2a8;
      --accent: #bb5a2a;
      --code: #f1ece4;
      --primary-row: #e8f5ef;
      --primary-line: #35835c;
      --expression-row: #eef1fb;
      --expression-line: #5369a6;
      --shared-row: #f5f1ea;
      --shared-line: #9b8670;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 16px/1.6 "Helvetica Neue", Arial, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at top left, #fbf7ef 0%, var(--paper) 46%, #ece4d8 100%);
    }
    .shell { max-width: 1080px; margin: 0 auto; padding: 32px 24px 72px; }
    .hero, main {
      background: rgba(255, 253, 249, 0.94);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(33, 24, 16, 0.08);
    }
    .hero { padding: 28px; margin-bottom: 22px; }
    main { padding: 28px; }
    h1, h2, h3, h4 { line-height: 1.2; margin: 28px 0 12px; }
    h1:first-child, h2:first-child, h3:first-child, h4:first-child { margin-top: 0; }
    h1 { font-size: 2.3rem; }
    h2 { font-size: 1.65rem; border-top: 1px solid var(--line); padding-top: 22px; }
    h2:first-child { border-top: 0; padding-top: 0; }
    h3 { font-size: 1.16rem; color: var(--accent); }
    h4 { font-size: 1rem; color: var(--ink); }
    p { margin: 0 0 14px; }
    ul, ol { margin: 0 0 16px; padding-left: 24px; }
    li { margin: 0 0 7px; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0 22px;
      font-size: 0.95rem;
    }
    th, td {
      border: 1px solid var(--line);
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }
    th { background: #f1e4d2; }
    .encoder-map td:first-child {
      width: 9.5rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .encoder-map tr.encoder-primary td {
      background: var(--primary-row);
      border-top-color: #b9d8c8;
      border-bottom-color: #b9d8c8;
    }
    .encoder-map tr.encoder-primary td:first-child {
      border-left: 5px solid var(--primary-line);
    }
    .encoder-map tr.encoder-expression td {
      background: var(--expression-row);
      border-top-color: #c5cce4;
      border-bottom-color: #c5cce4;
    }
    .encoder-map tr.encoder-expression td:first-child {
      border-left: 5px solid var(--expression-line);
    }
    .encoder-map tr.encoder-mode td {
      background: #fffaf2;
      border-top-color: #e3c9a7;
      border-bottom-color: #e3c9a7;
    }
    .encoder-map tr.encoder-mode td:first-child {
      border-left: 5px solid var(--accent);
    }
    .encoder-map tr.encoder-shared td {
      background: var(--shared-row);
      color: #43505b;
      border-top-color: #d9cbb8;
      border-bottom-color: #d9cbb8;
    }
    .encoder-map tr.encoder-shared td:first-child {
      border-left: 5px solid var(--shared-line);
    }
    .encoder-map tr.encoder-primary td:first-child::after,
    .encoder-map tr.encoder-expression td:first-child::after,
    .encoder-map tr.encoder-mode td:first-child::after,
    .encoder-map tr.encoder-shared td:first-child::after {
      display: block;
      margin-top: 4px;
      font-size: 0.68rem;
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }
    .encoder-map tr.encoder-primary td:first-child::after { content: "primary"; color: var(--primary-line); }
    .encoder-map tr.encoder-expression td:first-child::after { content: "expression"; color: var(--expression-line); }
    .encoder-map tr.encoder-mode td:first-child::after { content: "mode"; color: var(--accent); }
    .encoder-map tr.encoder-shared td:first-child::after { content: "shared"; color: var(--shared-line); }
    code {
      background: var(--code);
      border-radius: 6px;
      padding: 2px 6px;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 0.94em;
    }
    .kicker {
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 14px;
    }
    .lede { color: var(--muted); font-size: 1.06rem; margin-bottom: 0; }
    .footer { margin-top: 28px; color: var(--muted); font-size: 0.95rem; }
    @media (max-width: 720px) {
      .shell { padding: 18px 12px 48px; }
      .hero, main { padding: 18px; }
      table { display: block; overflow-x: auto; white-space: nowrap; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="kicker">Bitwig Oikontrol</div>
      <p class="lede">Bundled help generated from <code>docs/user-guide.md</code>.</p>
    </section>
    <main>
@@CONTENT@@
      <p class="footer">Canonical source for this guide is maintained in the repository as <code>docs/user-guide.md</code>. This bundled HTML is generated during the Gradle resource build.</p>
    </main>
  </div>
</body>
</html>
